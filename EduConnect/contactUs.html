<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <link rel="stylesheet" href="./Style/Register.css" />
  </head>
  <body>
    <section
      style="
        background-image: linear-gradient(
            rgba(4, 9, 30, 0.7),
            rgba(4, 9, 30, 0.7)
          ),
          url(./images/contact.jpg);
      "
      class="sub-header"
    >
      <nav>
        <a
          href="index.html"
          style="
            color: #fff;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: underline;
          "
        >
          Edu Connect
        </a>
        <div class="nav-links" id="navLinks">
          <i class="fa fa-times" onclick="hideMenu()"></i>
          <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="aboutUs.html">ABOUT</a></li>
            <li><a href="contactUs.html">CONTACT</a></li>
          </ul>
        </div>
        <i class="fa fa-bars" onclick="showMenu()"></i>
      </nav>
      <h1>Contact Us</h1>
    </section>

    <section class="contact-us">
      <div class="row">
        <div class="contact-col">
          <div>
            <i class="fa fa-home"></i>
            <span>
              <h5>IT Park, Millennium Dr</h5>
              <p>Malabe</p>
            </span>
          </div>
          <div>
            <i class="fa fa-phone"></i>
            <span>
              <h5>+94 3214755428</h5>
              <p>Monday to Sunday, 8.30 A.M. to 4.00 P.M.</p>
            </span>
          </div>
          <div>
            <i class="fa fa-envelope-o"></i>
            <span>
              <h5>educonnect@gmail.com</h5>
              <p>Get More Informations</p>
            </span>
          </div>
        </div>

        <div class="contact-col">
          <form action="PHP/submit_contact.php" method="POST">
            <input type="text" name="name" placeholder="Enter Your Name" required />
            <input type="email" name="email" placeholder="Enter Email Address" required />
            <input type="text" name="address" placeholder="Enter Address" required />
            <textarea rows="8" name="message" placeholder="Enter Your Message"></textarea>
            <button type="submit" class="hero-btn red-btn">Send Message</button>
          </form>
        </div>
      </div>
    </section>

    <section class="footer">
      <h4>ABOUT US</h4>
      <p>EDUCONNECT - Learn. Connect. Grow.</p>
    </section>

    <script>
      var navLinks = document.getElementById("navLinks");
      function showMenu() {
        navLinks.style.right = "0";
      }
      function hideMenu() {
        navLinks.style.right = "-200px";
      }
    </script>
  </body>
</html>
